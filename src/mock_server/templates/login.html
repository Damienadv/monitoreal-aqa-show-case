{% extends "base.html" %}
{% block title %}Login — Monitoreal Mock UI{% endblock %}
{% block content %}
<section class="login">
  <h1>Sign in</h1>
  <form method="post" action="/ui/login" data-testid="login-form">
    <label for="api_key">API key</label>
    <input
      id="api_key"
      name="api_key"
      type="text"
      autocomplete="off"
      autofocus
      data-testid="api-key-input"
    />
    {% if error %}
      <p class="error" data-testid="login-error">{{ error }}</p>
    {% endif %}
    <button type="submit" data-testid="login-submit">Sign in</button>
  </form>
</section>
{% endblock %}
