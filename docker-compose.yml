services:
  mock-api:
    build:
      context: .
      target: api
    image: monitoreal-mock-api:dev
    container_name: monitoreal-mock-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  webhook-sink:
    image: mendhak/http-https-echo:35
    container_name: monitoreal-webhook-sink
    ports:
      - "8001:8080"
    environment:
      - HTTP_PORT=8080
    restart: unless-stopped
